<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ Link Vault | Animated Bookmark Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0c1a, #02040c);
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background particles */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
        }

        /* Floating glowing orbs (CSS only) */
        .floating-orb {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(45,212,191,0.15), transparent);
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 18s infinite alternate ease-in-out;
        }
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(80px, 60px) scale(1.3); opacity: 0.6; }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Header with glitch */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeSlideUp 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .hero h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #a5f3fc, #7c3aed, #f472b6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            animation: titleGlow 3s infinite alternate;
        }
        @keyframes titleGlow {
            0% { text-shadow: 0 0 2px rgba(165,243,252,0.3); }
            100% { text-shadow: 0 0 12px #a5f3fc; }
        }
        .hero p {
            font-size: 1.1rem;
            opacity: 0.85;
            margin-top: 0.3rem;
        }

        /* Search & filter bar */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            animation: fadeSlideUp 0.7s 0.1s backwards;
        }
        .search-box {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
            display: flex;
            align-items: center;
            border: 1px solid #2dd4bf;
            transition: all 0.3s;
        }
        .search-box:hover {
            box-shadow: 0 0 12px #2dd4bf80;
            border-color: #5eead4;
        }
        .search-box i {
            color: #2dd4bf;
        }
        .search-box input {
            background: transparent;
            border: none;
            padding: 0.6rem 0.8rem;
            color: white;
            font-size: 0.9rem;
            width: 220px;
            outline: none;
        }
        .filter-group {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(30, 40, 60, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #2dd4bf80;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #e2e8f0;
        }
        .filter-btn.active, .filter-btn:hover {
            background: #2dd4bf;
            color: #02040c;
            border-color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px #2dd4bf60;
        }

        /* Links grid */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 1.6rem;
            margin-top: 0.5rem;
        }
        /* animated card */
        .link-card {
            background: rgba(12, 20, 32, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1.2rem;
            border: 1px solid rgba(45,212,191,0.4);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 0;
            transform: translateY(20px);
            animation: cardAppear 0.5s forwards;
            cursor: pointer;
        }
        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }
        .link-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: #5eead4;
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.6), 0 0 0 1px #2dd4bf60;
            background: rgba(20, 32, 48, 0.9);
        }
        .link-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.6rem;
        }
        .link-icon {
            font-size: 2rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e1a;
            border-radius: 1.2rem;
            transition: 0.2s;
        }
        .link-card:hover .link-icon {
            transform: rotate(3deg) scale(1.02);
            background: #2dd4bf20;
        }
        .link-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #c4b5fd;
        }
        .link-desc {
            font-size: 0.8rem;
            color: #cbd5e0;
            margin: 0.5rem 0;
            line-height: 1.4;
        }
        .link-url {
            font-family: monospace;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .link-tag {
            display: inline-block;
            background: #2dd4bf20;
            border-radius: 2rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            margin-top: 0.6rem;
            border: 1px solid #2dd4bf40;
        }
        .no-results {
            text-align: center;
            padding: 3rem;
            grid-column: 1/-1;
            font-size: 1.2rem;
            opacity: 0.7;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            opacity: 0.6;
        }
        @media (max-width: 700px) {
            .hero h1 { font-size: 2rem; }
            .container { padding: 1rem; }
            .controls { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<div class="floating-orb" style="top: -10%; left: -5%; width: 300px; height: 300px;"></div>
<div class="floating-orb" style="bottom: 0%; right: -5%; width: 400px; height: 400px; animation-duration: 22s;"></div>
<div class="container">
    <div class="hero">
        <h1><i class="fas fa-link"></i> Link Vault · Animated Store</h1>
        <p>curated cybersecurity, dev, tools & learning resources — with smooth animations & vibe</p>
    </div>
    <div class="controls">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search title, description...">
        </div>
        <div class="filter-group" id="categoryFilter">
           
            <button class="filter-btn active" data-cat="all">All</button>
            <button class="filter-btn" data-cat="red">red team target</button>
            <button class="filter-btn" data-cat="blue">blue team target</button>
           
        </div>
    </div>
    <div id="linksContainer" class="links-grid"></div>
    <footer>✨ click any card — link opens in new tab · dynamic animations & live filters</footer>
</div>

<script>
    // ---------- LINK DATABASE ---------------------------------------------------------------------------------------------------
    const linksDB = [


        { title: "SOC", desc: "Security Operations Center resources, blue team, soc, my target, target.", url: "targer cov/soc.html", icon: "fa-globe", category: "blue" },






        
    ];

    let activeCategory = "all";
    let searchQuery = "";

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderLinks() {
        const container = document.getElementById("linksContainer");
        if (!container) return;
        let filtered = linksDB.filter(link => {
            const matchesCat = activeCategory === "all" || link.category === activeCategory;
            const matchesSearch = searchQuery === "" || link.title.toLowerCase().includes(searchQuery) || link.desc.toLowerCase().includes(searchQuery);
            return matchesCat && matchesSearch;
        });
        if (filtered.length === 0) {
            container.innerHTML = `<div class="no-results"><i class="fas fa-dizzy"></i> No links found · try another keyword</div>`;
            return;
        }
        container.innerHTML = filtered.map((link, idx) => {
            return `
                <div class="link-card" data-url="${escapeHtml(link.url)}" style="animation-delay: ${idx * 0.02}s;">
                    <div class="link-header">
                        <div class="link-icon"><i class="fas ${link.icon}"></i></div>
                        <div class="link-title">${escapeHtml(link.title)}</div>
                    </div>
                    <div class="link-desc">${escapeHtml(link.desc)}</div>
                    <div class="link-url"><i class="fas fa-external-link-alt"></i> ${escapeHtml(link.url.replace(/^https?:\/\//, ''))}</div>
                    <span class="link-tag"><i class="fas fa-tag"></i> ${escapeHtml(link.category)}</span>
                </div>
            `;
        }).join('');
        // attach click handlers to open link
        document.querySelectorAll('.link-card').forEach(card => {
            const url = card.getAttribute('data-url');
            card.addEventListener('click', (e) => {
                // avoid if clicking inside interactive elements (no inner interactive yet)
                if (url) window.open(url, '_blank', 'noopener,noreferrer');
            });
        });
    }

    // event listeners
    const searchInput = document.getElementById("searchInput");
    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderLinks();
    });

    const catBtns = document.querySelectorAll(".filter-btn");
    catBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            catBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            activeCategory = btn.getAttribute("data-cat");
            renderLinks();
        });
    });

    // initial render
    renderLinks();

    // ---------- ANIMATED PARTICLES BACKGROUND ----------
    const canvas = document.getElementById("particle-canvas");
    let ctx = canvas.getContext("2d");
    let particles = [];
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.r = Math.random() * 2.2 + 0.8;
            this.vx = (Math.random() - 0.5) * 0.25;
            this.vy = (Math.random() - 0.5) * 0.2 + 0.05;
            this.alpha = Math.random() * 0.5 + 0.1;
            this.color = `rgba(45, 212, 191, ${this.alpha})`;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            if(this.x < -20) this.x = canvas.width + 20;
            if(this.x > canvas.width + 20) this.x = -20;
            if(this.y < -20) this.y = canvas.height + 20;
            if(this.y > canvas.height + 20) this.y = -20;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 6;
            ctx.shadowColor = "#2dd4bf";
            ctx.fill();
        }
    }
    function initParticles(cnt = 140) {
        particles = [];
        for(let i=0;i<cnt;i++) particles.push(new Particle());
    }
    function animateParticles() {
        if(!ctx) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let p of particles) {
            p.update();
            p.draw();
        }
        requestAnimationFrame(animateParticles);
    }
    window.addEventListener('resize', () => {
        resizeCanvas();
        initParticles(140);
    });
    resizeCanvas();
    initParticles(150);
    animateParticles();

    // additional floating animation on cards refresh
    const style = document.createElement('style');
    style.textContent = `
        .link-card { transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.2s, box-shadow 0.2s; }
        .link-card:hover .link-icon i { animation: iconWiggle 0.4s ease; }
        @keyframes iconWiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }
        .filter-btn { transition: all 0.2s ease; backdrop-filter: blur(4px); }
        .search-box input::placeholder { color: #94a3b8; }
    `;
    document.head.appendChild(style);
</script>
</body>
</html>
